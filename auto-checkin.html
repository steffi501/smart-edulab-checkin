<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-In/Out</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .container {
            text-align: center;
            color: white;
            animation: fadeIn 0.5s;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .info {
            font-size: 1.2em;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        .loading {
            margin-top: 20px;
            font-size: 1em;
            opacity: 0.7;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="loading">
            <div class="spinner">⏳</div>
            <p>Verarbeite...</p>
        </div>
    </div>
    
    <script>
        // ============================================
        // KONFIGURATION - HIER DEINE WEBHOOK URL!
        // ============================================
        const WEBHOOK_URL = 'https://hook.eu1.make.com/YOUR-WEBHOOK-URL';
        
        // ============================================
        // AUTO CHECK-IN/OUT LOGIK
        // ============================================
        
        async function autoCheckInOut() {
            // Prüfe: Bereits eingecheckt?
            const sessionId = localStorage.getItem('coworking_session');
            const checkinTime = localStorage.getItem('coworking_checkin_time');
            
            if (sessionId && checkinTime) {
                // User ist bereits eingecheckt → CHECK-OUT!
                await performCheckOut(sessionId, checkinTime);
            } else {
                // Nicht eingecheckt → CHECK-IN!
                await performCheckIn();
            }
        }
        
        async function performCheckIn() {
            // Generiere eindeutige Session-ID
            const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const checkinTime = new Date().toISOString();
            
            // Rufe Webhook auf
            try {
                await fetch(WEBHOOK_URL + '?action=in&session=' + sessionId, {
                    method: 'GET'
                });
                
                // Speichere Session
                localStorage.setItem('coworking_session', sessionId);
                localStorage.setItem('coworking_checkin_time', checkinTime);
                
                // Zeige Success
                showCheckInSuccess();
                
            } catch (error) {
                showError('Check-In fehlgeschlagen');
            }
        }
        
        async function performCheckOut(sessionId, checkinTime) {
            // Berechne Dauer
            const checkoutTime = new Date();
            const checkin = new Date(checkinTime);
            const durationMinutes = Math.round((checkoutTime - checkin) / 60000);
            
            // Rufe Webhook auf
            try {
                await fetch(WEBHOOK_URL + '?action=out&session=' + sessionId + '&duration=' + durationMinutes, {
                    method: 'GET'
                });
                
                // Lösche Session
                localStorage.removeItem('coworking_session');
                localStorage.removeItem('coworking_checkin_time');
                
                // Zeige Success
                showCheckOutSuccess(durationMinutes);
                
            } catch (error) {
                showError('Check-Out fehlgeschlagen');
            }
        }
        
        function showCheckInSuccess() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('content').innerHTML = `
                <div class="icon">✓</div>
                <h1>Check-In erfolgreich!</h1>
                <p class="info">Eingecheckt um ${timeString} Uhr</p>
                <p class="info">Viel Spaß im Space! 🎉</p>
            `;
            
            // Konfetti-Effekt
            createConfetti();
        }
        
        function showCheckOutSuccess(duration) {
            const now = new Date();
            const timeString = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const hours = Math.floor(duration / 60);
            const minutes = duration % 60;
            
            let durationText = '';
            if (hours > 0) {
                durationText = `${hours}h ${minutes}min`;
            } else {
                durationText = `${minutes} Minuten`;
            }
            
            document.getElementById('content').innerHTML = `
                <div class="icon">👋</div>
                <h1>Check-Out erfolgreich!</h1>
                <p class="info">Ausgecheckt um ${timeString} Uhr</p>
                <p class="info">Du warst ${durationText} da</p>
                <p class="info">Bis bald! ✨</p>
            `;
            
            // Sparkle-Effekt
            createSparkles();
        }
        
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="icon">❌</div>
                <h1>Fehler</h1>
                <p class="info">${message}</p>
                <p class="info">Bitte versuche es erneut</p>
            `;
        }
        
        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: fixed;
                        width: 10px;
                        height: 10px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}vw;
                        animation: fall 3s linear forwards;
                        top: -10px;
                    `;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }
        
        function createSparkles() {
            const sparkles = ['✨', '⭐', '🌟', '💫'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
                    sparkle.style.cssText = `
                        position: fixed;
                        font-size: 20px;
                        left: ${Math.random() * 100}vw;
                        animation: fall 2s linear forwards;
                        top: -20px;
                    `;
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 2000);
                }, i * 80);
            }
        }
        
        // CSS für Animationen
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Starte Auto-Check-In/Out
        autoCheckInOut();
    </script>
</body>
</html>
